name: Build and Release MessagePack

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Convert JSON to MessagePack
        run: |
          uv run --with msgpack scripts/json_to_msgpack.py
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkghub.msgpack
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}